# Recovery shell — finds first bootable partition, drops to bash
menuentry "  * Recovery Shell  (auto-find root, drop to bash)" {
    for hd in 0 1 2 3 4 5; do
        for part in 1 2 3 4 5 6; do
            set dev="(hd${hd},gpt${part})"
            if [ -f "${dev}/boot/vmlinuz" ]; then
                set root="$dev"
                probe -u "$dev" --set=pu 2>/dev/null || set pu=""
                if [ -n "$pu" ]; then
                    linux ($root)/boot/vmlinuz root=UUID=${pu} ro \
                          init=/bin/bash
                else
                    linux ($root)/boot/vmlinuz root=${dev} ro \
                          init=/bin/bash
                fi
                initrd ($root)/boot/initrd.img
                break 2
            fi
        done
    done
}

# Recovery shell with manual drive picker
menuentry "  * Recovery Shell  (show partitions, pick manually)" {
    echo ""
    echo "  Partitions with a Linux kernel:"
    echo ""
    for hd in 0 1 2 3 4 5; do
        for part in 1 2 3 4 5 6; do
            set dev="(hd${hd},gpt${part})"
            if [ -f "${dev}/boot/vmlinuz" ]; then
                probe -l "$dev" --set=pl 2>/dev/null || set pl="unlabeled"
                probe -f "$dev" --set=pf 2>/dev/null || set pf="?"
                echo "    hd${hd},gpt${part}  [${pf}]  ${pl}"
            fi
        done
    done
    echo ""
    echo "  Use GRUB Shell to boot manually:"
    echo "    set root=(hdX,gptY)"
    echo "    linux (\$root)/boot/vmlinuz root=\$root ro init=/bin/bash"
    echo "    initrd (\$root)/boot/initrd.img"
    echo "    boot"
    echo ""
    sleep --interruptible 999
}

menuentry "  * Script Recovery  (boot, auto-run recover_scripts.sh)" {
    for hd in 0 1 2 3 4 5; do
        for part in 1 2 3 4 5 6; do
            set dev="(hd${hd},gpt${part})"
            if [ -f "${dev}/boot/vmlinuz" ]; then
                set root="$dev"
                probe -u "$dev" --set=pu 2>/dev/null || set pu=""
                if [ -n "$pu" ]; then
                    linux ($root)/boot/vmlinuz root=UUID=${pu} ro \
                          phoenix.recovery=1
                else
                    linux ($root)/boot/vmlinuz root=${dev} ro \
                          phoenix.recovery=1
                fi
                initrd ($root)/boot/initrd.img
                break 2
            fi
        done
    done
}

menuentry "  * Clone Mode  (read-only, safe dd/rsync)" {
    for hd in 0 1 2 3 4 5; do
        for part in 1 2 3 4 5 6; do
            set dev="(hd${hd},gpt${part})"
            if [ -f "${dev}/boot/vmlinuz" ]; then
                set root="$dev"
                probe -u "$dev" --set=pu 2>/dev/null || set pu=""
                if [ -n "$pu" ]; then
                    linux ($root)/boot/vmlinuz root=UUID=${pu} ro \
                          phoenix.clone=1
                else
                    linux ($root)/boot/vmlinuz root=${dev} ro \
                          phoenix.clone=1
                fi
                initrd ($root)/boot/initrd.img
                break 2
            fi
        done
    done
}

menuentry "  * Lifeboat  (label=lifeboat)" {
    search --no-floppy --label --set=root "lifeboat"
    linux  ($root)/boot/vmlinuz root=LABEL=lifeboat ro quiet
    initrd ($root)/boot/initrd.img
}

menuentry "  * GRUB Shell" {
    insmod normal
    terminal_input console
    terminal_output console
}

menuentry "" { true }
menuentry "  [ VAULT — btrfs scan ]" { true }
menuentry "" { true }

menuentry "  # Scan and list all btrfs vault partitions" {
    insmod btrfs
    echo ""
    echo "  ── BTRFS PARTITIONS ────────────────────────────"
    echo ""
    for hd in 0 1 2 3 4 5 6 7; do
        for part in 1 2 3 4 5 6 7 8; do
            set dev="(hd${hd},gpt${part})"
            probe -f "$dev" --set=pfs 2>/dev/null || set pfs=""
            if [ "$pfs" = "btrfs" ]; then
                probe -l "$dev" --set=pl 2>/dev/null || set pl="unlabeled"
                probe -u "$dev" --set=pu 2>/dev/null || set pu=""
                echo "    hd${hd},gpt${part}  label=${pl}"
                echo "    uuid=${pu}"
                echo ""
            fi
        done
    done
    echo "  ────────────────────────────────────────────────"
    echo "  Press any key..."
    sleep --interruptible 999
}

menuentry "" { true }
menuentry "  [ INSTALL ]" { true }
menuentry "" { true }

menuentry "  + Install Phoenix GRUB permanently to disk" {
    echo ""
    echo "  Boot into your OS then run:"
    echo ""
    echo "    sudo ./install_phoenix_grub.sh /dev/sdX"
    echo ""
    echo "  Available drives:"
    for hd in 0 1 2 3 4 5 6 7; do
        set found=""
        for part in 1 2 3; do
            probe -f "(hd${hd},gpt${part})" --set=pfs 2>/dev/null || set pfs=""
            if [ -n "$pfs" ]; then
                set found="yes"
            fi
        done
        if [ -n "$found" ]; then
            echo "    hd${hd}"
        fi
    done
    echo ""
    sleep --interruptible 999
}

menuentry "  + Rekey USB  (run gen_key.sh from your OS)" {
    echo ""
    echo "  sudo ./gen_key.sh /dev/sdX"
    echo ""
    sleep --interruptible 15
}

fi
