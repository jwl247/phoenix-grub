# ============================================================
#  PHOENIX-DEVOPS-oS  —  Master Boot Controller
#  grub.cfg  v3.0  —  Auto-Detect Edition
#
#  - Probes all drives on every boot
#  - Builds menu dynamically from what it finds
#  - No hardcoded drive paths — works on any machine
#  - USB key = full access / no key = boot only
#  - timeout=-1 — always stops, always asks
# ============================================================

set default=0
set timeout=-1
set timeout_style=menu

# ── Modules ──────────────────────────────────────────────────
insmod all_video
insmod gfxterm
insmod part_gpt
insmod part_msdos
insmod lvm
insmod btrfs
insmod ext2
insmod xfs
insmod fat
insmod ntfs
insmod chain
insmod search
insmod search_fs_uuid
insmod search_label
insmod probe
insmod memdisk
insmod tar
insmod hashsum
insmod gcry_sha256
insmod password_pbkdf2
insmod regexp
insmod echo
insmod test
insmod true
insmod sleep

terminal_output gfxterm
set color_normal=cyan/black
set color_highlight=black/cyan

# ============================================================
#  USB KEY CHECK
# ============================================================

set PHOENIX_KEY_HASH="a01e4c3d1e84074b76dee9dee761e81fcd05360229615a01453a2811b6cb2614"
set KEY_VALID="false"
set KEY_DEVICE="none"

for hd in 0 1 2 3 4 5 6 7; do
    for part in 1 2 3 4; do
        for scheme in gpt msdos; do
            set dev="(hd${hd},${scheme}${part})"
            if [ -f "${dev}/.phoenix_key" ]; then
                load_env --file "${dev}/.phoenix_key" KEYVAL 2>/dev/null || true
                if [ "$KEYVAL" = "$PHOENIX_KEY_HASH" ]; then
                    set KEY_VALID="true"
                    set KEY_DEVICE="$dev"
                fi
            fi
        done
    done
done

if [ "$KEY_VALID" = "true" ]; then
    set color_normal=green/black
    set color_highlight=black/green
    set KEY_STATUS="KEY PRESENT — FULL ACCESS"
else
    set KEY_STATUS="NO KEY — BOOT ONLY"
    set superusers="phoenix"
    password_pbkdf2 phoenix grub.pbkdf2.sha512.10000.DEADBEEF.LOCKED
fi

# ============================================================
#  HEADER
# ============================================================

menuentry "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" { true }
menuentry "   PHOENIX-DEVOPS-oS  //  BOOT CONTROLLER v3  " { true }
menuentry "   $KEY_STATUS                                 " { true }
menuentry "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" { true }
menuentry "" { true }
menuentry "  [ DETECTED SYSTEMS ]" { true }
menuentry "" { true }

# ============================================================
#  AUTO-DETECT DISTROS
#  Walks every hd/partition, looks for /boot/vmlinuz
#  Probes UUID and label so root= is always correct
# ============================================================

for hd in 0 1 2 3 4 5 6 7; do
    for part in 1 2 3 4 5 6 7 8; do
        for scheme in gpt msdos; do
            set dev="(hd${hd},${scheme}${part})"

            # Skip if no OS marker
            if [ -f "${dev}/boot/vmlinuz" ] || [ -f "${dev}/vmlinuz" ]; then

                probe -l "${dev}" --set=plabel 2>/dev/null || set plabel=""
                probe -u "${dev}" --set=puuid  2>/dev/null || set puuid=""
                probe -f "${dev}" --set=pfs    2>/dev/null || set pfs=""

                # Kernel and initrd paths
                set kpath="/boot/vmlinuz"
                set ipath="/boot/initrd.img"
                if [ -f "${dev}/vmlinuz" ]; then
                    set kpath="/vmlinuz"
                    set ipath="/initrd.img"
                fi

                # Build label for menu entry
                if [ -n "$plabel" ]; then
                    set entrylabel="$plabel"
                else
                    set entrylabel="hd${hd} part${part} ${scheme} [${pfs}]"
                fi

                menuentry "  > $entrylabel" \
                    "$dev" "$kpath" "$ipath" "$puuid" "$plabel" {

                    set root="$2"
                    set kp="$3"
                    set ip="$4"
                    set pu="$5"
                    set pl="$6"

                    if [ -n "$pu" ]; then
                        linux  ($root)${kp} root=UUID=${pu} ro quiet splash
                    elif [ -n "$pl" ]; then
                        linux  ($root)${kp} root=LABEL=${pl} ro quiet splash
                    else
                        linux  ($root)${kp} root=$root ro quiet splash
                    fi
                    initrd ($root)${ip}
                }
            fi

        done
    done
done

# ── LVM (RHEL/Rocky/Fedora on LVM) ───────────────────────────
menuentry "  > RHEL/Rocky LVM  (rhel-root)" {
    insmod lvm
    set root=(lvmid/rhel-root)
    linux  /boot/vmlinuz root=/dev/mapper/rhel-root ro quiet
    initrd /boot/initramfs.img
}

# ── Windows chainload ─────────────────────────────────────────
for hd in 0 1 2 3 4 5; do
    for part in 1 2 3 4; do
        set dev="(hd${hd},gpt${part})"
        if [ -f "${dev}/bootmgr" ]; then
            probe -l "$dev" --set=wlabel 2>/dev/null || set wlabel="Windows"
            menuentry "  > Windows  [ $wlabel ]" "$dev" {
                insmod ntfs
                insmod chain
                set root="$2"
                chainloader +1
            }
        fi
    done
done

menuentry "" { true }

# ============================================================
#  DRIVE MAP  (always visible)
# ============================================================

menuentry "  i  Show all drives & partitions" {
    echo ""
    echo "  ── DRIVES ─────────────────────────────────────"
    for hd in 0 1 2 3 4 5 6 7; do
        set found=""
        for part in 1 2 3 4 5 6 7 8; do
            set dev="(hd${hd},gpt${part})"
            probe -f "$dev" --set=pfs 2>/dev/null || set pfs=""
            if [ -n "$pfs" ]; then
                if [ -z "$found" ]; then
                    echo ""
                    echo "  hd${hd}:"
                    set found="yes"
                fi
                probe -l "$dev" --set=pl 2>/dev/null || set pl="---"
                probe -u "$dev" --set=pu 2>/dev/null || set pu="---"
                echo "    gpt${part}  ${pfs}  ${pl}"
            fi
        done
    done
    echo ""
    echo "  ───────────────────────────────────────────────"
    echo "  Press any key to return..."
    sleep --interruptible 999
}

menuentry "" { true }

